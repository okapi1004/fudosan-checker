# 巡回間隔（分）
schedule:
  interval_minutes: 60

# ===== ポータルサイト =====
sites:
  kenbiya:
    enabled: true
    search_url: "https://www.kenbiya.com/pp0/m/yamagata/tsuruoka-shi/"
  rakumachi:
    enabled: true
    search_url: "https://www.rakumachi.jp/syuuekibukken/area/prefecture/dimAll/?area%5B0%5D=06203"
  suumo:
    enabled: true
    search_url: "https://suumo.jp/chukoikkodate/yamagata/sc_tsuruoka/"
  athome:
    enabled: false  # botブロック（認証画面）が出るため無効化
    search_url: "https://www.athome.co.jp/kodate/yamagata/tsuruoka-city/list/"
  fudosan_japan:
    enabled: false  # 403/botブロックのため無効化
    search_url: "https://www.fudousan.or.jp/property/buy/06/area/list?m_adr%5B%5D=06203"

# ===== 鶴岡市 地域不動産会社 =====
custom_sites:
  # --- スクレイピングしやすいサイト ---

  - name: "拓生土地地所（中古住宅）"
    enabled: true
    url: "https://takusei.biz/sale_category/used-house/"
    use_playwright: false
    selectors:
      listing: ".property-list-box"
      title: ".property-list-title a"
      price: ".property-list-price"
      link: ".property-list-title a"
      address: ".property-list-info-item"

  - name: "拓生土地地所（土地）"
    enabled: true
    url: "https://takusei.biz/sale_category/land/"
    use_playwright: false
    selectors:
      listing: ".property-list-box"
      title: ".property-list-title a"
      price: ".property-list-price"
      link: ".property-list-title a"
      address: ".property-list-info-item"

  - name: "荘内ハウジング（売家）"
    enabled: true
    url: "https://www.shonai-h.com/sale-house/"
    use_playwright: false
    selectors:
      listing: ".vk_outer"
      title: "h2 a"
      link: "h2 a"
    labels:
      price: "価　格"
      address: "所在地"

  - name: "荘内ハウジング（土地）"
    enabled: true
    url: "https://www.shonai-h.com/tochi/"
    use_playwright: false
    selectors:
      listing: ".vk_outer"
      title: "h2 a"
      link: "h2 a"
    labels:
      price: "価　格"
      address: "所在地"

  - name: "カスタムエージェント"
    enabled: true
    url: "https://www.customsmile.co.jp/pickup/"
    use_playwright: false
    selectors:
      listing: "li.pickup-list__item"
      title: ".pickup-item-name"
      price: ".pickup-price, .pickup-price02"
      link: ".pickup-detail a"
      address: ".pickup-address"

  - name: "アクア不動産（戸建て）"
    enabled: true
    url: "https://www.aqua-fudousan.co.jp/kodate/yamagata/result/tsuruoka-city.html"
    use_playwright: false
    selectors:
      listing: "div.article-object"
      title: "p.object-name > a"
      price: "td.cell3"
      link: "p.object-name > a"
      address: ""

  - name: "アクア不動産（土地）"
    enabled: true
    url: "https://www.aqua-fudousan.co.jp/uri-tochi/yamagata/result/tsuruoka-city.html"
    use_playwright: false
    selectors:
      listing: "div.article-object"
      title: "p.object-name > a"
      price: "td.cell3"
      link: "p.object-name > a"
      address: ""

  - name: "鈴木不動産（土地）"
    enabled: true
    url: "https://www.realestate.gr.jp/?search_element_0=&cf_limit_keyword_1=&cf_limit_keyword_2=&searchbutton=%E6%A4%9C%E7%B4%A2&csp=search_add&feadvns_max_line_2=6&fe_form_no=2"
    use_playwright: false
    selectors:
      listing: "article"
      title: "h3 a"
      price: "ul li:first-child"
      link: "h3 a"
      address: "ul li:nth-child(3)"

  - name: "鈴木不動産（戸建て）"
    enabled: true
    url: "https://www.realestate.gr.jp/?search_element_0=&cf_limit_keyword_1=&cf_limit_keyword_2=&searchbutton=%E6%A4%9C%E7%B4%A2&csp=search_add&feadvns_max_line_2=6&fe_form_no=11"
    use_playwright: false
    selectors:
      listing: "article"
      title: "h3 a"
      price: "ul li:first-child"
      link: "h3 a"
      address: "ul li:nth-child(3)"

  - name: "J Home Design"
    enabled: true
    url: "https://j-home-design.com/sale/"
    use_playwright: false
    selectors:
      listing: "ul > li"
      title: "h3"
      price: "p:nth-of-type(1)"
      link: "a[href*='/sale/']"
      address: ""

  # --- Playwright必要（JS動的レンダリング） ---

  - name: "庄司不動産情報館"
    enabled: true
    url: "https://s-johokan.com/estate/buy/house/list"
    use_playwright: true
    selectors:
      listing: "table.list"
      title: "a.estateTitle"
      price: ".flL.w200 .fSize20"
      link: "a.estateTitle"
      address: ""

  - name: "阿部多不動産"
    enabled: true
    url: "https://abeta-f.jp/?bukken=jsearch&shu=1&ken=06&sik=203"
    use_playwright: false
    selectors:
      listing: "article"
      title: "h2.entry-title a"
      price: "dd.dpoint3"
      link: "h2.entry-title a"
      address: "td.list_address_td"
    pagination:
      url_pattern: "https://abeta-f.jp/?bukken=jsearch&shu=1&ken=06&sik=203&paged={n}"
      max_pages: 20

  - name: "石橋不動産"
    enabled: true
    url: "https://espo1484.co.jp/?bukken=ch4&so=kak&ord="
    use_playwright: false
    selectors:
      listing: "ul.grid-content li"
      title: "span.top_title"
      price: "span.top_price"
      link: "a[href*='/fudo/']"
      address: "span.top_shozaichi"

  # --- 2回目の調査で追加 ---

  - name: "尾形ホーム"
    enabled: true
    url: "https://ogata-home.co.jp/publics/index/14/"
    use_playwright: false
    selectors:
      listing: "div.record"
      title: "span.estate-list-title"
      price: "span.bold.strong"
      link: "a.m-right-10"
      address: "td.bottom-cell"

  - name: "大和住建（土地）"
    enabled: true
    url: "https://www.daiwa-jk.com/uri-tochi/yamagata/result/"
    use_playwright: false
    selectors:
      listing: "div.article-object"
      title: "p.object-name > a"
      price: "td.cell3"
      link: "p.object-name > a"
      address: "td.cell1"

  - name: "十和建設（戸建）"
    enabled: true
    url: "https://www.towagp.jp/kodate/yamagata/result/"
    use_playwright: false
    selectors:
      listing: "div.article-object"
      title: "p.object-name > a"
      price: "td.cell3"
      link: "p.object-name > a"
      address: "td.cell1"

  - name: "十和建設（土地）"
    enabled: true
    url: "https://www.towagp.jp/uri-tochi/yamagata/result/"
    use_playwright: false
    selectors:
      listing: "div.article-object"
      title: "p.object-name > a"
      price: "td.cell3"
      link: "p.object-name > a"
      address: "td.cell1"

  - name: "北斗産業"
    enabled: true
    url: "https://www.hokutosan.jp/?bukken=jsearch&shub=1&tik=0&kalb=0&kahb=0&mel=0&meh=0"
    use_playwright: false
    selectors:
      listing: "div.list-box"
      title: "h4.list-h4 a"
      link: "h4.list-h4 a"
    labels:
      price: "価　格"
      address: "所在地"

  - name: "まちあかり"
    enabled: true
    url: "https://www.machiakari1007.com/fudo/"
    use_playwright: false
    selectors:
      listing: "div.vk_post.bukken-sale"
      title: "h5.vk_post_title a"
      link: "h5.vk_post_title a"

  # --- 3回目の調査で追加 ---

  - name: "大同不動産（土地）"
    enabled: true
    url: "https://daido-fudosan.com/baibai/baibai.cgi?up1=1&keys2=q&sort=up8&tid=list1"
    use_playwright: false
    selectors:
      listing: "div.Buk_list"
      title: "div.numbers"
      price: "b.f_red"
      link: "a[href*='baibai.cgi']"
      address: "li:first-child b"

  - name: "大同不動産（中古住宅）"
    enabled: true
    url: "https://daido-fudosan.com/baibai/baibai.cgi?up1=1&keys2=r&sort=up8&tid=list2"
    use_playwright: false
    selectors:
      listing: "div.Buk_list"
      title: "div.numbers"
      price: "b.f_red"
      link: "a[href*='baibai.cgi']"
      address: "li:first-child b"

  - name: "つるおかランド・バンク"
    enabled: true
    url: "https://t-landbank.org/bukken/"
    use_playwright: false
    selectors:
      listing: "h3"
      title: "a"
      link: "a"

  # --- 現時点でスクレイピング困難なサイト（無効化） ---
  # HONMA不動産: サイトダウン中
  # アライブ: 外部サイト(SUUMO等)へリダイレクト
  # 白根不動産: 物件専用クラスなし
  # マルコ不動産: AJAX読み込み、クラスなし
  # 丸喜不動産: 物件2件のみ、クラスなし
  # 城西拓業: 価格/住所セレクタなし
  # J・クリエイティブ: 物件1件（成約済）
  # すまいるホーム: Elementor動的クラス
  # ロック: 現在掲載0件
  # 東和不動産: 現在掲載0件（アクア不動産と同プラットフォーム）
  # 小池不動産: NJC独自システム、複雑
  # office reDesign: 現在掲載0件（アクア同プラットフォーム、将来復活可能）
  # トータルハウジング夢空間: 価格が詳細ページのみ
  # 佐藤工務: 古いHTMLテーブル、詳細ページなし
  # 佐藤建築工務所: 売買物件欄が空

# ===== 通知設定 =====
notification:
  discord:
    enabled: true
    # webhook_url は .env ファイルに DISCORD_WEBHOOK_URL として記載
